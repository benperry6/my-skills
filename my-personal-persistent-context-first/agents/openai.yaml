interface:
  display_name: "Persistent Context First"
  short_description: "Bootstrap the technical control plane before coding"
  default_prompt: "Use $my-personal-persistent-context-first to turn my planning material or ChatGPT export into a durable docs-first technical control plane: instruction entrypoint, project brief, architecture, backlog, project state, ADRs, and a stop line before code. Preserve the repo's existing instruction-file convention when present. Do not use this for `.agents/business-model.md`, `.agents/storytelling.md`, `.agents/know-your-customer.md`, `.agents/performance-memory.md`, or other context-distillation outputs."
