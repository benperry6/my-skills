interface:
  display_name: "Internationalization"
  short_description: "Design, audit, or execute language-first multilingual SEO architecture and locale-catalog translation"
  default_prompt: "Use $my-personal-internationalization to design, audit, or implement language-first multilingual behavior for a website or web app. Focus on locale routing, preference handling, translation-catalog quality, and hreflang/canonical/sitemap SEO. When translation is in scope, keep translator prompts minimal, require native AI-written culturally adapted copy instead of programmatic translation, verify locales locally on disk before acceptance, and keep evaluator/correction loops explicit. Keep pricing-display logic optional and lightweight, and do not drift into heavy multi-country, multi-entity, or multi-billing architecture unless explicitly requested."
