interface:
  display_name: "Internationalization"
  short_description: "Design, audit, or execute language-first multilingual SEO architecture and locale-catalog translation"
  default_prompt: "Use $my-personal-internationalization to design, audit, or implement language-first multilingual behavior for a website or web app. Focus on locale routing, preference handling, translation-catalog quality, and hreflang/canonical/sitemap SEO. When translation is in scope, produce native AI-written culturally adapted catalog copy, not programmatic translation; include missing-key audit, hardcoded-string scan, independent evaluation, local file verification, and reusable correction loops. Keep pricing-display logic optional and lightweight, and do not drift into heavy multi-country, multi-entity, or multi-billing architecture unless explicitly requested."
